<!DOCTYPE html>
<html>
<head>
    <title>My Apple-Style Bio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7; /* Apple's light gray background */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Frosted Glass Header */
        nav {
            width: 100%;
            height: 44px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); /* This creates the frosted effect */
            position: fixed;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* The Main Content Card */
        .card {
            background: white;
            padding: 40px;
            border-radius: 30px; /* Rounded corners like an iPhone */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 100px;
            text-align: center;
            width: 300px;
        }

        h1 { font-size: 40px; font-weight: 600; letter-spacing: -0.5px; }
        
        button {
            background-color: #0071e3; /* Apple Blue */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>GitHub Portfolio</nav>

    <div class="card">
        <h1>Hello.</h1>
        <p>I'm building something great.</p>
        <button>Contact Me</button>
    </div>

</body>
</html>
