<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background: #000; /* Dark mode base */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Glows */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.4) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* The Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: scale(1.02); /* Subtle pop on hover */
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #a1a1a6;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 35px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--apple-blue);
            color: white;
            box-shadow: 0 0 20px rgba(0, 113, 227, 0.6);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-card">
        <h1>Think Different.</h1>
        <p>Mechanical Engineer. <br> C Programmer. <br> Web Explorer.</p>
        <a href="#" class="btn">View My Work</a>
    </div>

</body>
</html>
